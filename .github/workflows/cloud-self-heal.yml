name: "01 Cloud Self-Heal - Data Check & Repair"
run-name: "Self-heal check by @${{ github.actor }}"

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *" # Beijing 08:30 - morning health check
    - cron: "0 5 * * *" # Beijing 13:00 - midday recheck
    - cron: "0 12 * * *" # Beijing 20:00 - evening archive check

permissions:
  contents: write
  issues: write

concurrency:
  group: cloud-self-heal
  cancel-in-progress: false

jobs:
  data-check-and-repair:
    name: "Check data, repair safe issues, report failures"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Ensure directories
        run: mkdir -p outputs automation-workbench/data .tmp

      - name: Run data integrity check
        id: integrity
        run: node automation-workbench/cloud/data-integrity-check.mjs --fix
        continue-on-error: true

      - name: Generate self-heal suggestions
        id: suggestions
        run: |
          echo "## Self-heal suggestions" >> "$GITHUB_STEP_SUMMARY"
          node automation-workbench/cloud/cloud-self-heal.mjs suggest >> "$GITHUB_STEP_SUMMARY"

      - name: Show cloud status
        id: status
        run: node automation-workbench/cloud/cloud-self-heal.mjs status >> "$GITHUB_STEP_SUMMARY"

      - name: Open GitHub Issue on critical errors
        if: steps.integrity.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("outputs/data-integrity-report-latest.md", "utf8");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cloud data integrity failure - ${new Date().toISOString().slice(0, 10)}`,
              body: report.slice(0, 60000)
            });

      - name: Commit integrity fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.md automation-workbench/data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No integrity changes to commit."
          else
            git commit -m "fix(cloud): auto-repair data integrity"
            git push
          fi

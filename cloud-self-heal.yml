name: Second Book Self-Heal Runner

on:
  workflow_dispatch:
  schedule:
    # 每天 8:30 Asia/Shanghai (UTC 0:30)
    - cron: "30 0 * * *"
    # 每天 13:00 Asia/Shanghai (UTC 5:00) 下午巡检
    - cron: "0 5 * * *"
    # 每天 20:00 Asia/Shanghai (UTC 12:00) 晚间归档
    - cron: "0 12 * * *"

permissions:
  contents: write
  issues: write

jobs:
  self-heal-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Ensure directories
        run: mkdir -p outputs data .tmp

      - name: Run data integrity check
        id: integrity
        run: node automation-workbench/cloud/data-integrity-check.mjs --fix
        continue-on-error: true

      - name: Generate self-heal suggestions
        id: suggestions
        run: |
          echo "## 自愈建议" >> $GITHUB_STEP_SUMMARY
          node automation-workbench/cloud/cloud-self-heal.mjs suggest >> $GITHUB_STEP_SUMMARY

      - name: Show cloud status
        id: status
        run: node automation-workbench/cloud/cloud-self-heal.mjs status >> $GITHUB_STEP_SUMMARY

      - name: Open GitHub Issue on critical errors
        if: steps.integrity.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outputs/data-integrity-report-latest.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚨 第二大脑数据完整性异常 - " + new Date().toISOString().slice(0,10),
              body: report.slice(0, 60000)
            });

      - name: Commit integrity fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/*.md data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "fix(cloud): auto-repair data integrity"
            git push
          fi

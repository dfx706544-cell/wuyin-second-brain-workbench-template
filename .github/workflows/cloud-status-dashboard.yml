name: Cloud Status Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "automation-workbench/data/cloud-status.json"
      - "automation-workbench/cloud/cloud-status-dashboard.mjs"
      - ".github/workflows/cloud-status-dashboard.yml"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token=<SECRET:hash:10fd874b68>

concurrency:
  group: cloud-status
  cancel-in-progress: true

jobs:
  build-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Ensure directories
        run: mkdir -p outputs data .tmp .pages-site

      - name: Generate status dashboard
        run: node automation-workbench/cloud/cloud-status-dashboard.mjs

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pages-site/status/ data/cloud-status.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No status updates to commit."
          else
            git commit -m "chore(cloud): update status dashboard"
            git push
          fi

  deploy-pages:
    needs: build-status
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site
        run: |
          mkdir -p _site
          cp -r .pages-site/* _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4